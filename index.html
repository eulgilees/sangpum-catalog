<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 조회</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#185fa5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="상품조회">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }

    header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    header i { font-size: 20px; color: #185fa5; }
    header span { font-size: 16px; font-weight: 500; }
    .comment-search-btn { background: none; border: 1px solid #d4d4ce; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #5f5e5a; }
    .comment-search-btn:hover { background: #e6f1fb; color: #185fa5; border-color: #b5d4f4; }

    main { padding: 28px 24px; max-width: 640px; margin: 0 auto; }

    .scan-btn { width: 100%; background: #185fa5; color: #fff; border: none; border-radius: 12px; padding: 18px; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px; transition: background 0.15s; }
    .scan-btn i { font-size: 22px; }
    .scan-btn:hover { background: #0c447c; }

    .search-wrap { position: relative; margin-bottom: 24px; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #888780; }
    input[type="text"] { width: 100%; padding: 12px 16px 12px 40px; border: 1px solid #d4d4ce; border-radius: 10px; font-size: 15px; outline: none; background: #fff; color: #1a1a18; }
    input[type="text"]:focus { border-color: #185fa5; box-shadow: 0 0 0 3px #e6f1fb; }

    #result-area { display: none; }

    .result-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 14px; padding: 20px; margin-bottom: 12px; }

    .info-row { display: flex; gap: 16px; padding: 9px 0; border-bottom: 1px solid #f0f0ec; font-size: 14px; }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: #888780; flex-shrink: 0; width: 72px; }
    .info-val { color: #1a1a18; flex: 1; word-break: break-all; }
    .info-val-link { color: #185fa5; flex: 1; word-break: break-all; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
    .info-val-link:hover { color: #0c447c; }

    /* 댓글 */
    .comment-section { background: #fff; border: 1px solid #e5e5e0; border-radius: 14px; padding: 20px; }
    .comment-section-title { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: #1a1a18; }

    .comment-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

    .comment-item { background: #f5f5f3; border-radius: 10px; padding: 12px 14px; position: relative; }
    .comment-content { font-size: 14px; color: #1a1a18; line-height: 1.6; white-space: pre-wrap; word-break: break-all; padding-right: 24px; }
    .comment-actions { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
    .comment-meta { font-size: 12px; color: #b4b2a9; }
    .comment-reply-btn { font-size: 12px; color: #888780; background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; }
    .comment-reply-btn:hover { color: #185fa5; }
    .comment-delete { position: absolute; top: 10px; right: 10px; background: none; border: none; cursor: pointer; color: #d4d4ce; font-size: 16px; padding: 2px; display: flex; }
    .comment-delete:hover { color: #a32d2d; }

    .reply-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .reply-item { background: #fff; border-radius: 8px; padding: 10px 12px; position: relative; border-left: 3px solid #b5d4f4; }
    .reply-content { font-size: 13px; color: #1a1a18; line-height: 1.5; white-space: pre-wrap; word-break: break-all; padding-right: 24px; }
    .reply-meta { font-size: 11px; color: #b4b2a9; margin-top: 4px; }
    .reply-delete { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; color: #d4d4ce; font-size: 14px; display: flex; }
    .reply-delete:hover { color: #a32d2d; }

    .reply-input-wrap { margin-top: 10px; display: none; gap: 8px; align-items: flex-end; }
    .reply-input-wrap.open { display: flex; }
    .reply-input-wrap textarea { flex: 1; border: 1px solid #b5d4f4; border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: none; height: 50px; outline: none; background: #fff; }
    .reply-input-wrap textarea:focus { border-color: #185fa5; }
    .reply-submit { background: #185fa5; color: #fff; border: none; border-radius: 7px; padding: 8px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; height: 50px; }
    .reply-submit:hover { background: #0c447c; }

    .comment-search-wrap { position: relative; margin-bottom: 12px; }
    .comment-search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #888780; }
    .comment-search-wrap input { width: 100%; padding: 8px 12px 8px 32px; border: 1px solid #d4d4ce; border-radius: 8px; font-size: 13px; outline: none; background: #f5f5f3; color: #1a1a18; }
    .comment-search-wrap input:focus { border-color: #185fa5; background: #fff; }
    .comment-no-result { font-size: 13px; color: #b4b2a9; text-align: center; padding: 16px 0; }

    .comment-input-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .comment-input-wrap textarea { flex: 1; border: 1px solid #d4d4ce; border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: none; height: 60px; outline: none; color: #1a1a18; line-height: 1.5; }
    .comment-input-wrap textarea:focus { border-color: #185fa5; box-shadow: 0 0 0 3px #e6f1fb; }
    .comment-submit { background: #185fa5; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; height: 60px; }
    .comment-submit:hover { background: #0c447c; }

    /* 목록 */
    .list-header { font-size: 13px; color: #888780; margin-bottom: 8px; }
    .product-list { display: flex; flex-direction: column; gap: 8px; }
    .product-row { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 16px; cursor: pointer; transition: border-color 0.15s; }
    .product-row:hover { border-color: #b5d4f4; }
    .row-name { font-size: 14px; font-weight: 500; color: #1a1a18; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-sub { font-size: 12px; color: #888780; margin-top: 2px; }
    .row-price { font-size: 15px; font-weight: 500; color: #185fa5; flex-shrink: 0; }
    .more-btn { width: 100%; background: none; border: 1px solid #d4d4ce; border-radius: 10px; padding: 12px; font-size: 13px; color: #5f5e5a; cursor: pointer; margin-top: 8px; }
    .more-btn:hover { background: #f5f5f3; }

    .empty-msg { text-align: center; padding: 40px 0; color: #888780; font-size: 14px; }
    .empty-msg i { font-size: 32px; display: block; margin-bottom: 10px; }

    /* 댓글 검색 패널 */
    .comment-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900; align-items: flex-end; justify-content: center; }
    .comment-panel.open { display: flex; }
    .comment-panel-box { background: #fff; border-radius: 16px 16px 0 0; padding: 24px; width: 100%; max-width: 640px; max-height: 80vh; display: flex; flex-direction: column; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .panel-header h2 { font-size: 15px; font-weight: 500; }
    .panel-close { background: none; border: none; cursor: pointer; color: #888780; font-size: 22px; display: flex; }
    .panel-search-wrap { position: relative; margin-bottom: 14px; }
    .panel-search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #888780; }
    .panel-search-wrap input { width: 100%; padding: 10px 14px 10px 38px; border: 1px solid #d4d4ce; border-radius: 8px; font-size: 14px; outline: none; }
    .panel-search-wrap input:focus { border-color: #185fa5; }
    .panel-results { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .panel-result-item { border: 1px solid #e5e5e0; border-radius: 10px; padding: 14px; cursor: pointer; }
    .panel-result-item:hover { border-color: #b5d4f4; background: #fafaf8; }
    .panel-product-name { font-size: 14px; font-weight: 500; color: #1a1a18; margin-bottom: 6px; }
    .panel-comment-text { font-size: 13px; color: #5f5e5a; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
    .panel-comment-meta { font-size: 12px; color: #b4b2a9; margin-top: 6px; }
    .panel-empty { text-align: center; padding: 32px 0; color: #888780; font-size: 14px; }

    /* 스캐너 */
    .scanner-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .scanner-overlay.open { display: flex; }
    .scanner-box { background: #fff; border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; }
    .scanner-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .scanner-top h2 { font-size: 15px; font-weight: 500; }
    .scanner-close { background: none; border: none; cursor: pointer; color: #888780; font-size: 22px; display: flex; }
    #scanner-video-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #111; aspect-ratio: 4/3; margin-bottom: 14px; }
    #scanner-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .scan-line { position: absolute; left: 8%; right: 8%; height: 2px; background: #185fa5; animation: scan 2s ease-in-out infinite; }
    @keyframes scan { 0%,100% { top: 15%; } 50% { top: 85%; } }
    .scan-frame { position: absolute; inset: 10px; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 8px; }
    .scan-frame::before, .scan-frame::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: #185fa5; border-style: solid; }
    .scan-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
    .scan-frame::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
    .scanner-status { text-align: center; font-size: 14px; color: #888780; min-height: 20px; }
    .scanner-status.found { color: #3b6d11; font-weight: 500; }
    .scanner-status.notfound { color: #a32d2d; }

    /* 라이트박스 */
  </style>
</head>
<body>

<header>
  <div class="header-logo">
    <i class="ti ti-barcode"></i>
    <span>상품 조회</span>
  </div>
  <button class="comment-search-btn" onclick="openCommentPanel()">
    <i class="ti ti-message-search"></i> 특이사항 검색
  </button>
</header>

<main>
  <button class="scan-btn" onclick="openScanner()">
    <i class="ti ti-camera"></i>
    바코드 스캔
  </button>

  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="상품명 또는 바코드 번호 입력..."
      oninput="onSearch()" onkeydown="if(event.key==='Enter'){ clearTimeout(searchTimer); currentOffset=0; currentQuery=this.value.trim(); doSearch(false); }">
  </div>

  <div class="search-wrap" style="margin-bottom: 32px;">
    <i class="ti ti-message-search"></i>
    <input type="text" id="note-search-input" placeholder="특이사항 내용으로 검색..."
      oninput="onNoteSearch()" onkeydown="if(event.key==='Enter'){ clearTimeout(noteSearchTimer); doNoteSearch(); }">
  </div>

  <div id="result-area"></div>
</main>

<!-- 댓글 내용 검색 패널 -->
<div class="comment-panel" id="comment-panel" onclick="if(event.target===this) closeCommentPanel()">
  <div class="comment-panel-box">
    <div class="panel-header">
      <h2>특이사항 검색</h2>
      <button class="panel-close" onclick="closeCommentPanel()"><i class="ti ti-x"></i></button>
    </div>
    <div class="panel-search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="panel-search-input" placeholder="특이사항 내용으로 검색..." oninput="onPanelSearch()">
    </div>
    <div class="panel-results" id="panel-results">
      <div class="panel-empty">검색어를 입력하세요</div>
    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div id="lightbox" onclick="this.style.display='none'" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center; cursor:zoom-out;">
  <img id="lightbox-img" src="" alt="" style="max-width:90vw; max-height:90vh; border-radius:8px; object-fit:contain;">
</div>

<!-- 스캐너 -->
<div class="scanner-overlay" id="scanner-overlay">
  <div class="scanner-box">
    <div class="scanner-top">
      <h2>바코드를 카메라에 대주세요</h2>
      <button class="scanner-close" onclick="closeScanner()"><i class="ti ti-x"></i></button>
    </div>
    <div id="scanner-video-wrap">
      <video id="scanner-video" autoplay playsinline muted></video>
      <div class="scan-frame"></div>
      <div class="scan-line"></div>
    </div>
    <p class="scanner-status" id="scanner-status">인식 대기 중...</p>
  </div>
</div>

<script>
let searchTimer = null;
let currentOffset = 0;
let currentQuery = '';
let currentBarcode = '';
let codeReader = null;
let lastScanned = '';
let lastScannedTime = 0;
let panelTimer = null;
let noteSearchTimer = null;
let allComments = [];

function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentOffset = 0;
    currentQuery = document.getElementById('search-input').value.trim();
    doSearch(false);
  }, 300);
}

async function doSearch(append) {
  const q = currentQuery;
  if (!q) { document.getElementById('result-area').style.display = 'none'; return; }
  const url = `/api/search?q=${encodeURIComponent(q)}&limit=20&offset=${currentOffset}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.products.length === 1) {
    showSingleResult(data.products[0]);
  } else {
    showListResult(data.products, data.total, append);
  }
}

function showSingleResult(p) {
  currentBarcode = p.barcode || '';
  const imgUrl = p.barcode ? `https://contents.kyobobook.co.kr/sih/fit-in/400x0/pdt/${esc(p.barcode)}.jpg` : '';
  const area = document.getElementById('result-area');
  area.style.display = 'block';
  area.innerHTML = `
    <div class="result-card" style="display:flex; gap:20px; align-items:flex-start; margin-bottom:12px;">
      <div style="width:140px; flex-shrink:0;">
        <img id="product-img" src="/api/image?barcode=${esc(p.barcode)}" alt="상품 이미지"
          onclick="openImg(this.src)"
          onerror="handleImgError(this, '${imgUrl}')"
          style="width:140px; border-radius:6px; display:block; cursor:zoom-in;">
        <div id="img-upload-area" style="display:none; margin-top:8px;">
          <label style="display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:8px; border:1px dashed #b4b2a9; border-radius:8px; font-size:12px; color:#888780; cursor:pointer; background:#f5f5f3;">
            <i class="ti ti-camera-plus" style="font-size:16px;"></i> 사진 업로드
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="uploadImage(this, '${esc(p.barcode)}')">
          </label>
        </div>
      </div>
      <div style="flex:1; min-width:0;">
        ${row('조코드', p.category)}
        ${row('바코드', p.barcode)}
        ${row('상품명', p.name)}
        ${row('저자', p.author, true)}
        ${row('출판사', p.publisher)}
        ${row('출간일', formatDate(p.date))}
        ${row('가격', p.price > 0 ? '₩' + p.price.toLocaleString() : '—')}
        ${row('문화누리', p.cultural === 'Y' ? '가능' : p.cultural === 'N' ? '불가' : p.cultural || '—')}
      </div>
    </div>
    <div class="comment-section">
      <div class="comment-section-title">특이사항</div>
      <div class="comment-search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="comment-filter-input" placeholder="특이사항 내용 검색..." oninput="filterComments()">
      </div>
      <div class="comment-list" id="comment-list"></div>
      <div class="comment-input-wrap">
        <textarea id="comment-input" placeholder="특이사항을 입력하세요..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitComment();}"></textarea>
        <button class="comment-submit" onclick="submitComment()">등록</button>
      </div>
    </div>
  `;
  if (p.barcode) loadComments(p.barcode);
}

function showListResult(products, total, append) {
  const area = document.getElementById('result-area');
  area.style.display = 'block';
  if (!append) {
    if (!products.length) {
      area.innerHTML = '<div class="empty-msg"><i class="ti ti-search-off"></i>검색 결과가 없습니다</div>';
      return;
    }
    area.innerHTML = `
      <div class="list-header">검색 결과 ${total.toLocaleString()}개</div>
      <div class="product-list" id="product-list"></div>
      <button class="more-btn" id="more-btn" style="display:none" onclick="loadMore()">더 보기</button>
    `;
  }
  const list = document.getElementById('product-list');
  products.forEach(p => {
    const el = document.createElement('div');
    el.className = 'product-row';
    el.innerHTML = `
      <div style="flex:1; min-width:0;">
        <div class="row-name">${esc(p.name)}</div>
        <div class="row-sub">${esc([p.author, p.publisher].filter(Boolean).join(' · '))}</div>
      </div>
      <div class="row-price">${p.price > 0 ? '₩' + p.price.toLocaleString() : '—'}</div>
    `;
    el.onclick = () => showSingleResult(p);
    list.appendChild(el);
  });
  currentOffset += products.length;
  const moreBtn = document.getElementById('more-btn');
  if (moreBtn) moreBtn.style.display = currentOffset < total ? 'block' : 'none';
}

function loadMore() { doSearch(true); }

/* 댓글 */
async function loadComments(barcode) {
  const res = await fetch(`/api/comments?barcode=${encodeURIComponent(barcode)}`);
  allComments = await res.json();
  renderComments(allComments);
}

function filterComments() {
  const q = document.getElementById('comment-filter-input').value.toLowerCase().replace(/\s/g, '');
  if (!q) { renderComments(allComments); return; }
  const filtered = allComments.map(c => {
    const matchTop = c.content.toLowerCase().replace(/\s/g, '').includes(q);
    const matchedReplies = (c.replies || []).filter(r => r.content.toLowerCase().replace(/\s/g, '').includes(q));
    if (matchTop || matchedReplies.length) return { ...c, replies: matchTop ? (c.replies || []) : matchedReplies };
    return null;
  }).filter(Boolean);
  const list = document.getElementById('comment-list');
  if (!list) return;
  if (!filtered.length) { list.innerHTML = '<div class="comment-no-result">검색 결과가 없습니다</div>'; return; }
  renderComments(filtered);
}

function renderComments(comments) {
  const list = document.getElementById('comment-list');
  if (!list) return;
  list.innerHTML = comments.map(c => `
    <div class="comment-item" id="comment-${c.id}">
      <div class="comment-content">${esc(c.content)}</div>
      <div class="comment-actions">
        <span class="comment-meta">${esc(c.created_at)}</span>
        <button class="comment-reply-btn" onclick="toggleReplyInput(${c.id})">
          <i class="ti ti-arrow-back-up" style="font-size:13px;"></i> 답글
        </button>
      </div>
      <button class="comment-delete" onclick="deleteComment(${c.id})" title="삭제"><i class="ti ti-x"></i></button>
      ${c.replies && c.replies.length ? `
        <div class="reply-list">
          ${c.replies.map(r => `
            <div class="reply-item" id="comment-${r.id}">
              <div class="reply-content">${esc(r.content)}</div>
              <div class="reply-meta">${esc(r.created_at)}</div>
              <button class="reply-delete" onclick="deleteComment(${r.id})" title="삭제"><i class="ti ti-x"></i></button>
            </div>
          `).join('')}
        </div>
      ` : '<div class="reply-list" id="replies-${c.id}"></div>'}
      <div class="reply-input-wrap" id="reply-input-${c.id}">
        <textarea placeholder="답글을 입력하세요..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitReply(${c.id});}"></textarea>
        <button class="reply-submit" onclick="submitReply(${c.id})">등록</button>
      </div>
    </div>
  `).join('');
}

function toggleReplyInput(commentId) {
  const wrap = document.getElementById(`reply-input-${commentId}`);
  if (!wrap) return;
  const isOpen = wrap.classList.toggle('open');
  if (isOpen) wrap.querySelector('textarea').focus();
}

async function submitComment() {
  const input = document.getElementById('comment-input');
  const content = input.value.trim();
  if (!content || !currentBarcode) return;
  const created_at = new Date().toLocaleString('ko-KR');
  await fetch('/api/comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ barcode: currentBarcode, content, created_at })
  });
  input.value = '';
  loadComments(currentBarcode);
}

async function submitReply(parentId) {
  const wrap = document.getElementById(`reply-input-${parentId}`);
  const textarea = wrap.querySelector('textarea');
  const content = textarea.value.trim();
  if (!content || !currentBarcode) return;
  const created_at = new Date().toLocaleString('ko-KR');
  await fetch('/api/comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ barcode: currentBarcode, content, created_at, parent_id: parentId })
  });
  textarea.value = '';
  wrap.classList.remove('open');
  loadComments(currentBarcode);
}

async function deleteComment(id) {
  if (!confirm('삭제할까요?')) return;
  await fetch('/api/comments/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  loadComments(currentBarcode);
}

/* 댓글 내용 검색 패널 */
function onNoteSearch() {
  clearTimeout(noteSearchTimer);
  noteSearchTimer = setTimeout(doNoteSearch, 300);
}

async function doNoteSearch() {
  const q = document.getElementById('note-search-input').value.trim();
  const area = document.getElementById('result-area');
  if (!q) { area.style.display = 'none'; return; }
  const res = await fetch(`/api/comments/search?q=${encodeURIComponent(q)}`);
  const results = await res.json();
  area.style.display = 'block';
  if (!results.length) {
    area.innerHTML = '<div class="empty-msg"><i class="ti ti-search-off"></i>검색 결과가 없습니다</div>';
    return;
  }
  area.innerHTML = `
    <div class="list-header">특이사항 검색 결과 ${results.length}개</div>
    <div class="product-list">
      ${results.map(c => `
        <div class="product-row" onclick="goToProduct('${esc(c.barcode)}')">
          <div style="flex:1; min-width:0;">
            <div class="row-name">${esc(c.name || c.barcode)}</div>
            <div class="row-sub" style="margin-top:4px; color:#5f5e5a;">${esc(c.content)}</div>
            <div class="row-sub">${esc(c.created_at)}</div>
          </div>
          <i class="ti ti-chevron-right" style="color:#b4b2a9; flex-shrink:0;"></i>
        </div>
      `).join('')}
    </div>
  `;
}

function openCommentPanel() {
  document.getElementById('comment-panel').classList.add('open');
  setTimeout(() => document.getElementById('panel-search-input').focus(), 100);
}

function closeCommentPanel() {
  document.getElementById('comment-panel').classList.remove('open');
}

function onPanelSearch() {
  clearTimeout(panelTimer);
  panelTimer = setTimeout(doPanelSearch, 300);
}

async function doPanelSearch() {
  const q = document.getElementById('panel-search-input').value.trim();
  const container = document.getElementById('panel-results');
  if (!q) { container.innerHTML = '<div class="panel-empty">검색어를 입력하세요</div>'; return; }
  const res = await fetch(`/api/comments/search?q=${encodeURIComponent(q)}`);
  const results = await res.json();
  if (!results.length) {
    container.innerHTML = '<div class="panel-empty">검색 결과가 없습니다</div>';
    return;
  }
  container.innerHTML = results.map(c => `
    <div class="panel-result-item" onclick="goToProduct('${esc(c.barcode)}', '${esc(c.name || '')}')">
      <div class="panel-product-name">${esc(c.name || c.barcode)}</div>
      <div class="panel-comment-text">${esc(c.content)}</div>
      <div class="panel-comment-meta">${esc(c.created_at)}</div>
    </div>
  `).join('');
}

async function goToProduct(barcode, name) {
  closeCommentPanel();
  const res = await fetch(`/api/search?barcode=${encodeURIComponent(barcode)}&limit=1`);
  const data = await res.json();
  if (data.products[0]) {
    document.getElementById('search-input').value = barcode;
    showSingleResult(data.products[0]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

/* 이미지 에러 처리 — 로컬 없으면 교보 URL 시도, 교보도 없으면 업로드 버튼 표시 */
function handleImgError(img, kyoboUrl) {
  if (img.src.includes('/api/image') && kyoboUrl) {
    img.src = kyoboUrl;
  } else {
    img.style.display = 'none';
    const area = document.getElementById('img-upload-area');
    if (area) area.style.display = 'block';
  }
}

async function uploadImage(input, barcode) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('barcode', barcode);
  form.append('image', file);
  const res = await fetch('/api/image/upload', { method: 'POST', body: form });
  const data = await res.json();
  if (data.ok) {
    const img = document.getElementById('product-img');
    img.src = data.path + '&t=' + Date.now();
    img.style.display = 'block';
    document.getElementById('img-upload-area').style.display = 'none';
  }
}

/* 라이트박스 */
function openImg(url) {
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = url;
}

/* 스캐너 */
async function openScanner() {
  document.getElementById('scanner-overlay').classList.add('open');
  setStatus('카메라를 시작하는 중...', '');
  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
    const deviceId = devices.length > 0 ? devices[devices.length - 1].deviceId : undefined;
    await codeReader.decodeFromVideoDevice(deviceId, 'scanner-video', (result, err) => {
      if (result) onBarcodeScanned(result.getText());
    });
    setStatus('인식 대기 중...', '');
  } catch(e) {
    setStatus('카메라를 사용할 수 없습니다', 'notfound');
  }
}

async function onBarcodeScanned(code) {
  const now = Date.now();
  if (code === lastScanned && now - lastScannedTime < 2000) return;
  lastScanned = code;
  lastScannedTime = now;
  setStatus('검색 중...', '');
  const res = await fetch(`/api/search?barcode=${encodeURIComponent(code)}&limit=1`);
  const data = await res.json();
  const p = data.products[0];
  if (p) {
    setStatus('✓ ' + p.name, 'found');
    setTimeout(() => {
      closeScanner();
      showSingleResult(p);
      document.getElementById('search-input').value = p.barcode;
    }, 500);
  } else {
    setStatus('상품 없음: ' + code, 'notfound');
    setTimeout(() => setStatus('인식 대기 중...', ''), 2000);
  }
}

function closeScanner() {
  document.getElementById('scanner-overlay').classList.remove('open');
  if (codeReader) { codeReader.reset(); codeReader = null; }
}

function setStatus(msg, cls) {
  const el = document.getElementById('scanner-status');
  el.textContent = msg;
  el.className = 'scanner-status' + (cls ? ' ' + cls : '');
}

function row(label, val, clickable) {
  if (!val) return '';
  const valHtml = clickable
    ? `<span class="info-val-link" onclick="searchAuthor('${esc(String(val))}')">${esc(String(val))}</span>`
    : `<span class="info-val">${esc(String(val))}</span>`;
  return `<div class="info-row"><span class="info-key">${esc(label)}</span>${valHtml}</div>`;
}

function searchAuthor(author) {
  document.getElementById('search-input').value = author;
  currentQuery = author;
  currentOffset = 0;
  doSearch(false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function formatDate(d) {
  if (!d || d.length !== 8) return d;
  return d.slice(0,4) + '.' + d.slice(4,6) + '.' + d.slice(6,8);
}

// 서비스 워커 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
